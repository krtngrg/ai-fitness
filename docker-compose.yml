version: "3.9"

services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: movemate_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live reload in dev
      - backend_db:/app/db      # persist SQLite
    environment:
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=1
      - DJANGO_ALLOWED_HOSTS=localhost 127.0.0.1 backend
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py seed_exercises &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/docs/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: movemate_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app         # live reload in dev
      - /app/node_modules       # don't overwrite container node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_AI_SERVICE_URL=http://localhost:9001
    depends_on:
      - backend

  # ── FastAPI AI Service ──────────────────────────────────────────────────────
  ai_service:
    build:
      context: ./ai_model
      dockerfile: Dockerfile
    container_name: movemate_ai
    restart: unless-stopped
    ports:
      - "9001:9001"
    volumes:
      - ./ai_model:/app
    depends_on:
      - backend
    profiles:
      - ai                      # only starts with: docker compose --profile ai up

volumes:
  backend_db:
